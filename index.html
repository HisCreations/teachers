<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Video Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        h1 {
            padding: 20px;
        }

        .video-container {
            display: flex;
            flex-direction: column; /* stack videos vertically */
            align-items: center;
            gap: 20px; /* space between videos */
            padding: 20px;
        }

        video {
            width: 80%;        /* responsive width: 80% of container */
            max-width: 700px;  /* max size for large screens */
            height: auto;      /* maintain aspect ratio */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Optional: media query for very small screens */
        @media (max-width: 500px) {
            video {
                width: 95%;
            }
        }
    </style>
</head>
<body>

<h1>My Responsive Video Gallery</h1>

<div class="video-container">
    <video controls>
        <source src="https://drive.google.com/uc?export=download&id=1QGJNaxcKDETAED7dBI4d2eAezajbeN3o" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <video controls>
        <source src="https://drive.google.com/uc?export=download&id=1rlSt4rpjwvTWRD5pjo5GzFtF9BqCkUVa" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <video controls>
        <source src="https://drive.google.com/uc?export=download&id=1wNmn-mVna5Q_wNeabiKXElELFhbH2Gtp" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

</body>
</html>
