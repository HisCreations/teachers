<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mga Scandal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        h1 {
            padding: 20px;
        }

        .video-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        /* YouTube iframe style */
        iframe {
            width: 80%;
            max-width: 700px;
            aspect-ratio: 16 / 9;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: none;
        }

        video {
            width: 80%;
            max-width: 700px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        @media (max-width: 500px) {
            video, iframe {
                width: 95%;
            }
        }
    </style>
</head>
<body>

<h1>Mga Scandal</h1>

<div class="video-container">

    <img src="basubas.jpg" width="250" height="250" />

    <!-- Aredidon.mp4 replaced with YouTube embed -->
    <iframe 
        src="https://www.youtube.com/embed/RDHZY2oT-7A"
        title="Aredidon Video"
        allowfullscreen>
    </iframe>
    
    <iframe 
        src="https://www.youtube.com/embed/Vhd5N-v2h90"
        title="Romero video"
        allowfullscreen>
</iframe>

    <iframe 
        src="https://www.youtube.com/embed/hN-iT5aHE7M"
        title="Basubas Video"
        allowfullscreen>
</iframe>

</div>

</body>
</html>
